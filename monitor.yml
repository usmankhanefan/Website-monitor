name: Website Change Monitor

on:
  schedule:
    # প্রতি ৩০ মিনিটে চলবে (UTC time)
    - cron: "*/30 * * * *"
  workflow_dispatch:
    # GitHub-এর Actions ট্যাব থেকে হাতেও চালানো যাবে

jobs:
  check:
    runs-on: ubuntu-latest

    # Repo-তে links.json আপডেট করে commit করার permission
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checker
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python check_sites.py

      - name: Commit updated hashes back to repo
        run: |
          git config user.name "site-monitor-bot"
          git config user.email "bot@site-monitor"
          git add links.json
          git diff --staged --quiet || git commit -m "chore: update site hashes [skip ci]"
          git push
